name: Compliance Verification Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package.json
            frontend/package.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Verify Frontend Compilation (Production Build)
        run: |
          cd frontend
          npm run build

      - name: Verify Backend Boots Successfully
        env:
          PORT: 5000
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/compliance_db
          JWT_SECRET: supersecretjwttokenforcienvironmenttesting123
        run: |
          cd backend
          npm start &
          sleep 5
          curl --fail http://localhost:5000/ || exit 1
